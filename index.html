<!doctype html>
<html lang="pt-br" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moneymap</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- parte da acessibilidade -->
  <!-- VLibras começo-->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
  <!-- Vlibras fim -->
  <!-- Widgets de acessibilidade começo-->
  <script>
    // Configure before loading widget
    window.ACCESSIBILITY_WIDGET_CONFIG = {
      widgetWidth: '380px',
      colors: {
        primary: '#007bff',
        secondary: '#ffffff'
      },
      enableVoiceControl: false, // Disable voice control
      widgetPosition: {
        side: 'right',
        right: '5px',
        bottom: '40%'
      },
      // Aqui você controla o botão
      button: {
        size: '40px',        // tamanho do botão (menor ou maior)
        borderRadius: '45%', // formato arredondado
        iconSize: '20px'    // tamanho do ícone dentro do botão
      }
    };
  </script>
  <script src="https://unpkg.com/accessibility-widgets@latest/widget.js"></script>

  <!-- Widgets de acessibilidade fim -->

</body>

</html>
